# ══════════════════════════════════════════════════════════════════
# O.P.U.C — Cloudflare Pages Auto-Deploy
# ══════════════════════════════════════════════════════════════════
# Déploie la landing page statique sur Cloudflare Pages.
# Pour l'API + Auth, utilisez un hébergement Node.js dédié (Vercel/Railway).
# ══════════════════════════════════════════════════════════════════

name: Deploy Landing to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/components/landing/**'
      - 'public/**'

jobs:
  deploy-landing:
    runs-on: ubuntu-latest
    name: Deploy Landing Page
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name opuc --branch main
