# ══════════════════════════════════════════════════════════════════
# O.P.U.C — Backend Deploy to Google Cloud Run
# ══════════════════════════════════════════════════════════════════
# Sur push vers main : build Docker image + push Artifact Registry + deploy Cloud Run
#
# Prérequis (secrets GitHub à configurer) :
#   GCP_PROJECT_ID          : ID du projet GCP (ex: project-2cb691e5-ed64-4991-9e8)
#   GCP_SA_KEY              : Service Account JSON key (base64 ou brut)
#   NEON_DATABASE_URL       : Neon pooled connection string
#   NEON_MIGRATIONS_URL     : Neon direct connection string
#   JWT_SECRET              : Secret JWT (32+ chars)
#   R2_API_TOKEN            : Token Cloudflare R2 (cfat_...)
#   R2_ACCOUNT_ID           : Account ID Cloudflare
#   R2_BUCKET               : Bucket R2 (opuc-files)
# ══════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGION: europe-west1
  ARTIFACT_REPO: opuc-api
  SERVICE_NAME: opuc-api
  IMAGE: opuc-api

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -f backend/deployments/docker/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:latest \
            backend/

          docker push -a ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 60 \
            --concurrency 80 \
            --allow-unauthenticated \
            --set-env-vars "APP_ENV=production,LOG_LEVEL=info,PORT=8080,FRONTEND_URL=https://opuc.vercel.app" \
            --set-secrets "DATABASE_URL=NEON_DATABASE_URL:latest,MIGRATIONS_URL=NEON_MIGRATIONS_URL:latest,JWT_SECRET=JWT_SECRET:latest,R2_API_TOKEN=R2_API_TOKEN:latest,R2_ACCOUNT_ID=R2_ACCOUNT_ID:latest,R2_BUCKET=R2_BUCKET:latest" \
            --no-traffic \
            --tag preview-${{ github.sha }}

      - name: Route traffic to new revision
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-latest

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV
          echo "✅ Backend deployed to: $URL"

      - name: Test health endpoint
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Testing $URL/api/v1/health..."
          curl -sf "$URL/api/v1/health" || echo "⚠️  Health check failed (cold start?)"
