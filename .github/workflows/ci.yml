# ══════════════════════════════════════════════════════════════════
# O.P.U.C — CI (Continuous Integration)
# ══════════════════════════════════════════════════════════════════
# Sur chaque PR/push : lint + build backend Go + lint frontend
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ─── Backend Go ───────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -cover ./...
        continue-on-error: true  # Tests pas encore implémentés

  # ─── Frontend Next.js ─────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        continue-on-error: true  # Lockfile peut différer

      - name: Lint
        run: bun run lint
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret-for-ci
